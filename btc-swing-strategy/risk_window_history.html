<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memorie Structurală BTC</title>
  <style>
    body {
      margin: 0;
      padding: 18px;
      font-family: system-ui, sans-serif;
      background: #020617;
      color: #e5e7eb;
    }

    .shell {
      max-width: 560px;
      margin: 0 auto;
    }

    .title {
      text-align: center;
      color: #94a3b8;
      letter-spacing: .14em;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .card {
      background: rgba(15, 23, 42, .96);
      border: 1px solid rgba(56, 189, 248, .22);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 24px 70px rgba(0,0,0,.65);
    }

    .kicker {
      font-size: 11px;
      color: #38bdf8;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .big {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
    }

    .muted {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .tile {
      border-radius: 14px;
      background: rgba(2, 6, 23, .72);
      border: 1px solid rgba(148, 163, 184, .14);
      padding: 11px;
    }

    .label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 5px;
    }

    .value {
      font-size: 15px;
      font-weight: 700;
    }

    .row {
      border-top: 1px solid rgba(148, 163, 184, .12);
      padding: 12px 0;
    }

    .row:first-child {
      border-top: 0;
    }

    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 11px;
      margin-top: 6px;
      border: 1px solid rgba(56, 189, 248, .35);
      color: #bae6fd;
    }

    .danger {
      color: #fecaca;
      border-color: rgba(248, 113, 113, .45);
    }

    .ok {
      color: #bbf7d0;
      border-color: rgba(34, 197, 94, .45);
    }

    .error {
      color: #fecaca;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="title">Memorie Structurală BTC</div>

    <div id="content">
      <div class="card muted">Se încarcă istoricul...</div>
    </div>
  </div>

  <script>
    const CONTENT = document.getElementById("content");

    function pct(x) {
      if (x === null || x === undefined || !Number.isFinite(Number(x))) return "n/a";
      return (Number(x) * 100).toFixed(1) + "%";
    }

    function usd(x) {
      if (x === null || x === undefined || !Number.isFinite(Number(x))) return "n/a";
      return Number(x).toLocaleString("en-US", { maximumFractionDigits: 0 }) + " USD";
    }

    function safe(x, fallback = "n/a") {
      return x === null || x === undefined || x === "" ? fallback : x;
    }

    async function loadHistory() {
      try {
        const res = await fetch("risk_window_history.json?t=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        render(data);
      } catch (e) {
        CONTENT.innerHTML = `
          <div class="card error">
            Nu pot încărca risk_window_history.json.<br>
            Verifică dacă HTML-ul este în același folder cu JSON-ul.
          </div>
        `;
      }
    }

    function render(data) {
      const s = data.since_2025_12_summary || {};
      const history = data.history || [];
      const current = history.find(x => x.is_current);
      const top = s.top_streaks || [];

      CONTENT.innerHTML = `
        <div class="card">
          <div class="kicker">Seria curentă</div>
          <div class="big">${safe(s.current_streak_days, "0")} zile</div>
          <div class="muted" style="margin-top:8px;">
            Începând cu ${safe(current && current.start)} până la ${safe(current && current.end)}.
            Aceasta este o persistență de degradare structurală, nu recomandare de tranzacționare.
          </div>

          <div class="grid">
            <div class="tile">
              <div class="label">Clasament recent</div>
              <div class="value">${s.current_is_record ? "Record" : "#2 sau mai jos"}</div>
            </div>
            <div class="tile">
              <div class="label">Record recent</div>
              <div class="value">${safe(s.max_streak_days)} zile</div>
            </div>
            <div class="tile">
              <div class="label">Episoade din ${safe(s.since)}</div>
              <div class="value">${safe(s.events)}</div>
            </div>
            <div class="tile">
              <div class="label">Serii ≥ actuala</div>
              <div class="value">${safe(s.matching_or_longer_than_current)}</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="kicker">Top serii recente</div>
          ${top.map(item => `
            <div class="row">
              <div class="value">
                ${item.start} → ${item.end}
              </div>
              <div class="muted">
                Durată: <strong>${item.days} zile</strong><br>
                Preț start: ${usd(item.start_price)}<br>
                Preț final: ${usd(item.end_price)}<br>
                Drawdown minim: ${pct(item.min_drawdown)}
              </div>
              <span class="badge ${item.confirmed_major_drawdown ? "danger" : "ok"}">
                ${item.confirmed_major_drawdown
                  ? "A confirmat scădere >20%"
                  : "Nu a confirmat >20%"}
              </span>
              ${item.days_to_confirmation !== null && item.days_to_confirmation !== undefined
                ? `<span class="badge">Confirmare după ${item.days_to_confirmation} zile</span>`
                : ""}
              ${item.is_current ? `<span class="badge">Seria curentă</span>` : ""}
            </div>
          `).join("")}
        </div>

        <div class="card muted">
          Generat: ${safe(data.generated_at)}<br>
          Fereastră analizată: ${safe(data.window_days)} zile<br>
          Prag drawdown major: ${pct(data.major_drawdown_threshold)}
        </div>
      `;
    }

    loadHistory();
  </script>
</body>
</html>
