<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CohesivX BTC — Impactul zilei</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#040810;--bg2:#060c18;--panel:#081120;--panel-border:rgba(64,180,255,.35);--cyan:#39c9ff;--cyan-soft:#7fd9ff;--gold:#ffb23e;--gold2:#ff7a1a;--red:#ff3b3b;--red-soft:#ff6b6b;--green:#37e08a;--text:#eef4fb;--muted:#9db2c9}
*{box-sizing:border-box;margin:0;padding:0}body{background:radial-gradient(ellipse 900px 500px at 85% 8%,rgba(57,201,255,.10),transparent 60%),radial-gradient(ellipse 700px 500px at 10% 90%,rgba(255,122,26,.08),transparent 60%),linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text);font-family:Inter,sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 12px}.page{width:100%;max-width:760px;position:relative}.page:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(57,201,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(57,201,255,.05) 1px,transparent 1px);background-size:34px 34px;mask-image:radial-gradient(ellipse 100% 100% at 50% 0%,black 0%,transparent 75%);pointer-events:none;z-index:0}.content{position:relative;z-index:1}.back{display:inline-flex;align-items:center;gap:7px;margin:0 0 16px;text-decoration:none;color:#bffcff;border:1px solid rgba(57,201,255,.42);border-radius:999px;padding:8px 13px;background:rgba(8,17,32,.72);font-family:Rajdhani,sans-serif;font-weight:800;letter-spacing:.05em}.back:hover{border-color:var(--gold);color:#ffd27a}header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding-top:8px}.title-block{flex:1;min-width:0}h1.line1,h1.line2{font-family:Orbitron,sans-serif;font-weight:900;font-size:clamp(34px,8.5vw,58px);line-height:.94;letter-spacing:1px}.line1{color:#f2f6fb;text-shadow:0 0 22px rgba(200,220,255,.25)}.line2{background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 60%,#ff5b1a 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(255,140,30,.35);margin-bottom:14px}.badge{display:inline-block;font-family:Rajdhani,sans-serif;font-weight:700;letter-spacing:2px;font-size:clamp(16px,4vw,22px);color:var(--cyan-soft);border:1.5px solid var(--cyan);padding:6px 18px;border-radius:6px;box-shadow:0 0 18px rgba(57,201,255,.25),inset 0 0 12px rgba(57,201,255,.08);margin-bottom:12px}.subtitle{font-family:Rajdhani,sans-serif;font-weight:600;font-size:clamp(14px,3.4vw,17px);color:var(--muted);line-height:1.35;max-width:520px}.subtitle b,.accent{color:var(--gold);font-weight:700}.clock-wrap{flex-shrink:0;width:clamp(88px,22vw,130px);height:clamp(88px,22vw,130px);position:relative}.clock-wrap svg{width:100%;height:100%;filter:drop-shadow(0 0 14px rgba(57,201,255,.35))}.chart-card{margin-top:22px;position:relative;border:1px solid rgba(57,201,255,.22);border-radius:10px;overflow:hidden;background:linear-gradient(180deg,rgba(8,17,32,.74),rgba(4,8,16,.92));box-shadow:inset 0 0 28px rgba(57,201,255,.045)}.chart-card svg{display:block;width:100%;height:auto}.tag{font-family:Rajdhani,sans-serif;font-weight:800;font-size:18px;letter-spacing:1px}.tag-high{fill:var(--cyan-soft)}.tag-low{fill:var(--red-soft)}.structural-note{margin-top:16px;text-align:right;font-family:Rajdhani,sans-serif;font-weight:700;font-size:clamp(15px,3.6vw,18px);color:var(--cyan-soft);letter-spacing:.5px;line-height:1.3}.grid{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:600px){.grid{grid-template-columns:1fr}}.panel{border:1px solid var(--panel-border);border-radius:10px;background:rgba(8,15,28,.55);padding:16px 16px 18px}.panel-title{display:flex;align-items:center;gap:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:16px;letter-spacing:1px;color:var(--cyan-soft);margin-bottom:12px}.panel-title .ico{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--cyan);border-radius:50%;font-size:12px}.row{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid rgba(57,201,255,.15);border-radius:7px;margin-bottom:8px;font-family:Rajdhani,sans-serif;font-size:15px;font-weight:600;color:var(--text)}.row .value{margin-left:auto;font-weight:700}.blue{color:var(--cyan-soft)}.gold{color:var(--gold)}.bullet{display:flex;gap:9px;align-items:flex-start;font-family:Rajdhani,sans-serif;font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:9px;line-height:1.35}.bullet .dot{flex-shrink:0;margin-top:1px}.red{color:var(--red-soft);font-weight:700}.green{color:var(--green);font-weight:700}.right-col{display:flex;flex-direction:column;gap:16px}.day-box{border:1.5px solid var(--cyan);border-radius:10px;text-align:center;padding:16px 10px 18px;box-shadow:0 0 24px rgba(57,201,255,.15),inset 0 0 20px rgba(57,201,255,.05);position:relative}.day-label{font-family:Rajdhani,sans-serif;font-weight:700;font-size:20px;letter-spacing:2px;color:#e8f4ff}.day-number{font-family:Orbitron,sans-serif;font-weight:900;font-size:clamp(60px,14vw,84px);line-height:1;background:linear-gradient(180deg,#ffd27a,var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(255,150,30,.35)}.warning-box{border:1.5px solid var(--red);border-radius:10px;text-align:center;padding:18px 14px;box-shadow:0 0 24px rgba(255,59,59,.15),inset 0 0 18px rgba(255,59,59,.05)}.warning-icon{width:34px;height:34px;margin:0 auto 8px;color:var(--red)}.warning-box p{font-family:Rajdhani,sans-serif;font-weight:700;font-size:16.5px;line-height:1.3;color:#f2f2f2}.warning-box p.emph{color:var(--red-soft);margin-top:6px;font-size:17px}.footer-bar{margin-top:18px;border:1.5px solid var(--gold);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 0 22px rgba(255,178,62,.15),inset 0 0 16px rgba(255,178,62,.06)}.footer-bar .hourglass{font-size:30px;flex-shrink:0}.footer-bar p{font-family:Rajdhani,sans-serif;font-weight:700;font-size:clamp(15px,3.8vw,19px);letter-spacing:.3px}.brand{margin-top:20px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:15px;color:var(--muted);letter-spacing:.5px;padding-bottom:8px}.brand svg{width:20px;height:20px}.brand .sep{color:rgba(157,178,201,.4)}.brand .sub{color:var(--cyan-soft)}
</style>
</head>
<body>
<div class="page"><div class="content">
<a class="back" id="backLink" href="../mecanism.html">← Înapoi la BTC Monitor</a>
<header><div class="title-block"><h1 class="line1" id="titleLine1">IMPACTUL</h1><h1 class="line2" id="titleLine2">ZILEI</h1><div class="badge" id="badgeText">SE ÎNCARCĂ</div><div class="subtitle" id="subtitleText">Datele se actualizează.</div></div><div class="clock-wrap" id="clockWrap"></div></header>
<div class="chart-card" id="chartCard"></div>
<div class="structural-note" id="structuralNote">TIMPUL<br>STRUCTURAL<br>NU AȘTEAPTĂ.</div>
<div class="grid"><div class="left-col"><div class="panel"><div class="panel-title"><span class="ico">◎</span> <span id="contextTitle">CONTEXT VS. ISTORIC</span></div><div class="row"><span>📅</span> <span id="histLabel">Istoric 2018+</span>: <span class="value blue" id="histAvgValue">–</span></div><div class="row"><span>🕐</span> <span id="precedentLabel">Precedent 2026</span>: <span class="value gold" id="precedentValue">–</span></div></div><div class="panel" style="margin-top:16px"><div class="panel-title"><span class="ico">🧠</span> <span id="meaningTitle">CE ÎNSEAMNĂ?</span></div><div id="meaningList"></div></div></div><div class="right-col"><div class="day-box"><div class="day-label" id="dayLabel">ZIUA</div><div class="day-number" id="dayNumber">–</div></div><div class="warning-box"><svg class="warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 L22 20 L2 20 Z" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.9" fill="currentColor" stroke="none"/></svg><p id="warningLine1">–</p><p class="emph" id="warningLine2">–</p></div></div></div>
<div class="footer-bar"><span class="hourglass">⏳</span><p id="footerLine">–</p></div>
<div class="brand"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L22 8 L12 14 L2 8 Z" fill="#39c9ff" opacity="0.85"/><path d="M12 10 L22 16 L12 22 L2 16 Z" fill="#ffb23e" opacity="0.85"/></svg>CohesivX <span class="sep">|</span> <span class="sub">BTC Monitor</span></div>
</div></div>
<script src="./impact-engine.js?v=2"></script>
<script>
function buildClock(){const wrap=document.getElementById('clockWrap'),now=new Date(),hr=(now.getHours()%12+now.getMinutes()/60)*30,min=now.getMinutes()*6;wrap.innerHTML=`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="47" fill="rgba(6,12,22,.6)" stroke="#39c9ff" stroke-width="1.5"/><circle cx="50" cy="50" r="41" fill="none" stroke="#39c9ff" stroke-width="0.6" opacity="0.4"/>${Array.from({length:12}).map((_,i)=>{const a=i*30*Math.PI/180,x1=50+Math.sin(a)*38,y1=50-Math.cos(a)*38,x2=50+Math.sin(a)*34,y2=50-Math.cos(a)*34;return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#7fd9ff" stroke-width="1"/>`}).join('')}<line x1="50" y1="50" x2="${50+Math.sin(hr*Math.PI/180)*22}" y2="${50-Math.cos(hr*Math.PI/180)*22}" stroke="#eef4fb" stroke-width="2.4" stroke-linecap="round"/><line x1="50" y1="50" x2="${50+Math.sin(min*Math.PI/180)*32}" y2="${50-Math.cos(min*Math.PI/180)*32}" stroke="#39c9ff" stroke-width="1.8" stroke-linecap="round"/><circle cx="50" cy="50" r="2.4" fill="#ffb23e"/></svg>`}
function buildChart(low=59500,high=75000){const W=720,H=320,padTop=34,padBottom=30,priceTop=79000,priceBottom=55500,chartH=H-padTop-padBottom,priceToY=p=>padTop+(priceTop-p)/(priceTop-priceBottom)*chartH,yHigh=priceToY(high),yLow=priceToY(low);let lines=`<line x1="42" y1="${yHigh}" x2="680" y2="${yHigh}" stroke="#7fd9ff" stroke-width="1.5" stroke-dasharray="8 8" opacity=".88"/><line x1="42" y1="${yLow}" x2="680" y2="${yLow}" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="8 8" opacity=".88"/><text x="52" y="${yHigh-8}" class="tag tag-high">70K–75K</text><text x="52" y="${yLow-8}" class="tag tag-low">59.5K</text>`;const prices=[66600,66100,65000,63600,62300,61200,60400,59800,60300,60600,60100,60750,61100,60800,61500,61200,60700,60300,59800,59400,59600,59900,60300,60600,60400,60100,60650,61250,61700,61400,61100,61950,62400,61600];let candles='';for(let i=0;i<prices.length-1;i++){const open=prices[i],close=prices[i+1],hi=Math.max(open,close)+450+(i%3)*110,lo=Math.min(open,close)-430-(i%4)*90,x=58+i*(620/(prices.length-2)),w=8,up=close>=open,color=up?'#37e08a':'#ff4a4a',yO=priceToY(open),yC=priceToY(close),yH=priceToY(hi),yL=priceToY(lo),bodyY=Math.min(yO,yC),bodyH=Math.max(4,Math.abs(yO-yC));candles+=`<line x1="${x}" y1="${yH}" x2="${x}" y2="${yL}" stroke="${color}" stroke-width="1.5"/><rect x="${x-w/2}" y="${bodyY}" width="${w}" height="${bodyH}" rx="1.5" fill="${color}"/>`;}document.getElementById('chartCard').innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#39c9ff" stop-opacity=".08"/><stop offset="1" stop-color="#040810" stop-opacity=".08"/></linearGradient></defs><rect width="${W}" height="${H}" fill="url(#g)"/>${[75,125,175,225,275].map(y=>`<line x1="42" y1="${y}" x2="680" y2="${y}" stroke="#7fd9ff" stroke-opacity=".06"/>`).join('')}${lines}${candles}<path d="M52 ${priceToY(66500)} C170 ${priceToY(61000)}, 275 ${priceToY(59200)}, 365 ${priceToY(60400)} S555 ${priceToY(59800)}, 665 ${priceToY(61800)}" fill="none" stroke="#ffb23e" stroke-opacity=".28" stroke-width="2"/></svg>`}
function setText(id,value){const el=document.getElementById(id);if(el)el.textContent=value||'–'}
function setHtml(id,value){const el=document.getElementById(id);if(el)el.innerHTML=value||'–'}
function renderImpact(data){const lang=(localStorage.getItem('coeziv_btc_lang')==='en')?'en':'ro',t=data.text||{},m=data.metrics||{};document.documentElement.lang=lang;document.title='CohesivX BTC — '+(lang==='en'?'Today’s Impact':'Impactul zilei');setText('backLink',lang==='en'?'← Back to BTC Monitor':'← Înapoi la BTC Monitor');setText('titleLine1',t.titleLine1);setText('titleLine2',t.titleLine2);setText('badgeText',t.badge);setHtml('subtitleText',t.pageSubtitle);setHtml('structuralNote',(t.note||'').replace(/ /g,'<br>'));setText('contextTitle',lang==='en'?'CONTEXT VS. HISTORY':'CONTEXT VS. ISTORIC');setText('histLabel',lang==='en'?'History 2018+':'Istoric 2018+');setText('precedentLabel',lang==='en'?'2026 precedent':'Precedent 2026');setText('histAvgValue',(lang==='en'?'average ~':'medie ~')+m.avg+' '+(lang==='en'?'days':'zile'));setText('precedentValue',m.precedent+' '+(lang==='en'?'days':'zile'));setText('dayLabel',lang==='en'?'DAY':'ZIUA');setText('dayNumber',m.day||'–');setText('warningLine1',t.warning1);setText('warningLine2',t.warning2);setHtml('footerLine',t.footer);document.getElementById('meaningList').innerHTML=(t.meaning||[]).map(x=>'<div class="bullet"><span class="dot">•</span><span>'+x+'</span></div>').join('');buildChart();}
async function init(){buildClock();setInterval(buildClock,60000);buildChart();const engine=window.CohesivXImpactEngine;if(!engine)return;const data=await engine.load('../');renderImpact(data);setInterval(async()=>renderImpact(await engine.load('../')),60000);window.addEventListener('storage',async e=>{if(e.key==='coeziv_btc_lang')renderImpact(await engine.load('../'))});}
init();
</script>
</body>
</html>
