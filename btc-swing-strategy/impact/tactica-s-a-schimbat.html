<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CohesivX BTC — Impactul zilei</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#040810;--bg2:#060c18;--panel:#081120;--line:#1f9bd1;--cyan:#39c9ff;--cyan2:#7fd9ff;--gold:#ffb23e;--orange:#ff7a1a;--red:#ff5757;--green:#37e08a;--text:#eef4fb;--muted:#9db2c9}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(ellipse 900px 520px at 85% 8%,rgba(57,201,255,.11),transparent 60%),linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);font-family:Inter,sans-serif;display:flex;justify-content:center;padding:22px 12px}.page{width:100%;max-width:760px;position:relative}.page:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(57,201,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(57,201,255,.045) 1px,transparent 1px);background-size:34px 34px;pointer-events:none}.content{position:relative;z-index:1}.back{display:inline-flex;align-items:center;margin-bottom:18px;text-decoration:none;color:#bffcff;border:1px solid rgba(57,201,255,.42);border-radius:999px;padding:9px 14px;background:rgba(8,17,32,.75);font-family:Rajdhani,sans-serif;font-weight:800;letter-spacing:.05em}.hero{display:flex;gap:16px;align-items:flex-start}.hero-copy{flex:1;min-width:0}.line1,.line2{font-family:Orbitron,sans-serif;font-weight:900;font-size:clamp(34px,8.6vw,60px);line-height:.94;letter-spacing:1px;text-transform:uppercase}.line1{color:#f2f6fb}.line2{background:linear-gradient(90deg,var(--gold),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}.badge{display:inline-block;margin:14px 0 12px;font-family:Rajdhani,sans-serif;font-size:clamp(16px,4vw,22px);font-weight:800;letter-spacing:2px;color:var(--cyan2);border:1.5px solid var(--cyan);border-radius:8px;padding:7px 18px}.subtitle{font-family:Rajdhani,sans-serif;color:var(--muted);font-size:clamp(15px,3.8vw,19px);font-weight:700;line-height:1.35;max-width:560px}.clock{width:clamp(86px,22vw,132px);height:clamp(86px,22vw,132px);flex-shrink:0}.clock svg{width:100%;height:100%;filter:drop-shadow(0 0 14px rgba(57,201,255,.35))}.chart-card{margin-top:22px;border:1px solid rgba(57,201,255,.24);border-radius:16px;background:linear-gradient(180deg,rgba(8,17,32,.82),rgba(4,8,16,.95));overflow:hidden;box-shadow:0 18px 40px rgba(0,0,0,.26)}.chart-head{display:flex;justify-content:space-between;gap:10px;padding:13px 14px 0;font-family:Rajdhani,sans-serif;color:var(--cyan2);font-weight:800;letter-spacing:.04em}.chart-note{color:var(--muted);font-size:12px;text-align:right}.chart-card svg{display:block;width:100%;height:auto}.structural-note{margin:16px 0;text-align:right;font-family:Rajdhani,sans-serif;font-weight:800;font-size:clamp(16px,4vw,22px);color:var(--cyan2);letter-spacing:.08em}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{border:1px solid rgba(57,201,255,.32);border-radius:16px;background:rgba(8,15,28,.62);padding:16px}.panel-title{font-family:Rajdhani,sans-serif;font-weight:900;font-size:18px;color:var(--cyan2);letter-spacing:.08em;margin-bottom:12px}.row{display:flex;justify-content:space-between;gap:10px;border:1px solid rgba(57,201,255,.16);border-radius:10px;padding:10px 11px;margin-bottom:9px;font-family:Rajdhani,sans-serif;font-weight:800;font-size:16px}.blue{color:var(--cyan2)}.gold{color:var(--gold)}.bullet{font-family:Rajdhani,sans-serif;font-size:16px;font-weight:700;line-height:1.35;margin-bottom:10px;color:var(--text)}.bullet span{color:var(--gold)}.day-box{border:1.5px solid var(--cyan);border-radius:16px;text-align:center;padding:16px 10px;margin-bottom:16px}.day-label{font-family:Rajdhani,sans-serif;font-weight:900;font-size:20px;letter-spacing:2px}.day-number{font-family:Orbitron,sans-serif;font-size:clamp(62px,15vw,90px);font-weight:900;background:linear-gradient(180deg,#ffd27a,var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}.warning{border:1.5px solid var(--red);border-radius:16px;padding:16px;text-align:center;font-family:Rajdhani,sans-serif;font-weight:850;font-size:17px;line-height:1.32}.warning .emph{margin-top:8px;color:var(--red)}.footer{margin-top:18px;border:1.5px solid var(--gold);border-radius:16px;padding:16px;font-family:Rajdhani,sans-serif;font-size:19px;font-weight:850;line-height:1.3}.brand{text-align:center;margin-top:18px;color:var(--muted);font-family:Rajdhani,sans-serif;font-weight:800}.error{border:1px solid var(--red);padding:14px;border-radius:14px;background:rgba(255,87,87,.08);color:#ffd0d0;font-family:Rajdhani,sans-serif;font-weight:800;margin-top:14px}@media(max-width:620px){.grid{grid-template-columns:1fr}.hero{gap:10px}.chart-note{text-align:left}.chart-head{display:block}}
</style>
</head>
<body>
<div class="page"><div class="content">
<a class="back" id="backLink" href="../mecanism.html">← Înapoi la BTC Monitor</a>
<section class="hero"><div class="hero-copy"><div class="line1" id="titleLine1">IMPACTUL</div><div class="line2" id="titleLine2">ZILEI</div><div class="badge" id="badgeText">SE ÎNCARCĂ</div><div class="subtitle" id="subtitleText">Datele se actualizează.</div></div><div class="clock" id="clockWrap"></div></section>
<section class="chart-card"><div class="chart-head"><div id="chartTitle">Grafic structural real</div><div class="chart-note" id="chartNote">Date reale din monitor, nu grafic decorativ</div></div><div id="chartCard"></div></section>
<div class="structural-note" id="structuralNote">TIMPUL STRUCTURAL NU AȘTEAPTĂ.</div>
<div class="grid"><div><div class="panel"><div class="panel-title" id="contextTitle">CONTEXT VS. ISTORIC</div><div class="row"><span id="histLabel">Istoric 2018+</span><span class="blue" id="histAvgValue">–</span></div><div class="row"><span id="precedentLabel">Precedent 2026</span><span class="gold" id="precedentValue">–</span></div></div><div class="panel" style="margin-top:16px"><div class="panel-title" id="meaningTitle">CE ÎNSEAMNĂ?</div><div id="meaningList"></div></div></div><div><div class="day-box"><div class="day-label" id="dayLabel">ZIUA</div><div class="day-number" id="dayNumber">–</div></div><div class="warning"><div id="warningLine1">–</div><div class="emph" id="warningLine2">–</div></div></div></div>
<div class="footer" id="footerLine">–</div><div class="brand">CohesivX | BTC Monitor</div>
</div></div>
<script src="./impact-engine.js?v=2"></script>
<script>
(function(){
'use strict';
var KEY='coeziv_btc_lang';
function isEn(){try{return localStorage.getItem(KEY)==='en'||document.documentElement.lang==='en'||(document.body&&document.body.getAttribute('data-lang')==='en')}catch(e){return false}}
function t(ro,en){return isEn()?en:ro}
function set(id,txt){var el=document.getElementById(id); if(el) el.textContent=txt}
function money(v){var n=Number(v); if(!Number.isFinite(n)) return '–'; return '$'+Math.round(n).toLocaleString('en-US')}
function buildClock(){var w=document.getElementById('clockWrap'),now=new Date(),hr=(now.getHours()%12+now.getMinutes()/60)*30,min=now.getMinutes()*6; if(!w)return; w.innerHTML='<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="47" fill="rgba(6,12,22,.6)" stroke="#39c9ff" stroke-width="1.5"/><circle cx="50" cy="50" r="41" fill="none" stroke="#39c9ff" stroke-width="0.6" opacity="0.4"/>'+Array.from({length:12}).map(function(_,i){var a=i*30*Math.PI/180,x1=50+Math.sin(a)*38,y1=50-Math.cos(a)*38,x2=50+Math.sin(a)*34,y2=50-Math.cos(a)*34;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#7fd9ff" stroke-width="1"/>'}).join('')+'<line x1="50" y1="50" x2="'+(50+Math.sin(hr*Math.PI/180)*22)+'" y2="'+(50-Math.cos(hr*Math.PI/180)*22)+'" stroke="#eef4fb" stroke-width="2.4" stroke-linecap="round"/><line x1="50" y1="50" x2="'+(50+Math.sin(min*Math.PI/180)*32)+'" y2="'+(50-Math.cos(min*Math.PI/180)*32)+'" stroke="#39c9ff" stroke-width="1.8" stroke-linecap="round"/><circle cx="50" cy="50" r="2.4" fill="#ffb23e"/></svg>'}
function pointsFromState(state){var pts=[];(state.signal_history||[]).forEach(function(x,i){var p=Number(x.price_usd||x.ic_close_usd||x.model_price_usd); if(Number.isFinite(p)) pts.push({label:String(x.date||i+1),price:p,signal:x.signal||''})}); var cur=Number(state.price_usd||state.ic_close_usd); if(Number.isFinite(cur)){var last=pts.length?pts[pts.length-1].price:null; if(last===null||Math.abs(last-cur)>1) pts.push({label:t('acum','now'),price:cur,signal:state.signal||''});} return pts.slice(-18)}
function buildRealChart(state){var root=document.getElementById('chartCard'); if(!root)return; var pts=pointsFromState(state||{}); if(pts.length<2){root.innerHTML='<div class="error">'+t('Nu sunt suficiente puncte în signal_history pentru grafic real.','Not enough signal_history points for a real chart.')+'</div>'; return;} var W=720,H=330,L=54,R=34,T=36,B=48,innerW=W-L-R,innerH=H-T-B; var bands=(state&&state.model_price_bands)||{}; var lower=Number(bands.p10||bands.lower||bands.low); var model=Number(state&&state.model_price_usd); var prices=pts.map(function(p){return p.price}); if(Number.isFinite(lower)) prices.push(lower); if(Number.isFinite(model)) prices.push(model); var min=Math.min.apply(null,prices),max=Math.max.apply(null,prices); if(max===min){max+=1000;min-=1000} var pad=(max-min)*0.12; min-=pad; max+=pad; function x(i){return L+(pts.length===1?0:i/(pts.length-1))*innerW} function y(v){return T+(max-v)/(max-min)*innerH} var grid=''; for(var g=0;g<5;g++){var yy=T+g*innerH/4; grid+='<line x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'" stroke="rgba(127,217,255,.09)"/><text x="'+(W-R)+'" y="'+(yy-5)+'" fill="#7f94aa" font-size="11" text-anchor="end">'+money(max-(g/4)*(max-min))+'</text>'} function hline(v,color,label,dash){ if(!Number.isFinite(v))return ''; var yy=y(v); return '<line x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'" stroke="'+color+'" stroke-width="1.4" stroke-dasharray="'+dash+'"/><text x="'+(L+2)+'" y="'+(yy-7)+'" fill="'+color+'" font-size="12" font-weight="700">'+label+' '+money(v)+'</text>'}
var path=pts.map(function(p,i){return (i?'L':'M')+x(i)+' '+y(p.price)}).join(' '); var area=path+' L '+x(pts.length-1)+' '+(H-B)+' L '+x(0)+' '+(H-B)+' Z'; var circles=pts.map(function(p,i){var c=i===pts.length-1?'#ffb23e':'#37e08a';return '<circle cx="'+x(i)+'" cy="'+y(p.price)+'" r="'+(i===pts.length-1?5:3.5)+'" fill="'+c+'"/>'}).join(''); var last=pts[pts.length-1]; var svg='<svg viewBox="0 0 '+W+' '+H+'" role="img" aria-label="Real BTC monitor chart">'+grid+hline(model,'#7fd9ff',t('Model','Model'),'7 7')+hline(lower,'#ff6b6b',t('Bandă jos','Lower band'),'6 6')+'<path d="'+area+'" fill="rgba(57,201,255,.08)"/><path d="'+path+'" fill="none" stroke="#39c9ff" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>'+circles+'<text x="'+(W-R)+'" y="'+(y(last.price)-12)+'" fill="#ffb23e" font-size="14" font-weight="800" text-anchor="end">'+t('Curent','Current')+' '+money(last.price)+'</text><text x="'+L+'" y="'+(H-17)+'" fill="#9db2c9" font-size="12">'+pts[0].label+'</text><text x="'+(W-R)+'" y="'+(H-17)+'" fill="#9db2c9" font-size="12" text-anchor="end">'+last.label+'</text></svg>'; root.innerHTML=svg;}
function renderImpact(impact,state){document.documentElement.lang=isEn()?'en':'ro'; set('backLink',t('← Înapoi la BTC Monitor','← Back to BTC Monitor')); var title=impact.title||t('IMPACTUL ZILEI','TODAY\'S IMPACT'); var parts=title.split(' '); set('titleLine1',parts.slice(0,Math.ceil(parts.length/2)).join(' ')); set('titleLine2',parts.slice(Math.ceil(parts.length/2)).join(' ')||title); set('badgeText',impact.badge||'—'); set('subtitleText',impact.pageLead||impact.subtitle||''); set('structuralNote',impact.structuralNote||t('TIMPUL STRUCTURAL NU AȘTEAPTĂ.','STRUCTURAL TIME DOES NOT WAIT.')); set('contextTitle',t('CONTEXT VS. ISTORIC','CONTEXT VS. HISTORY')); set('histLabel',t('Istoric 2018+','History 2018+')); set('precedentLabel',t('Precedent 2026','2026 precedent')); set('histAvgValue',t('medie ~'+impact.avgDays+' zile','average ~'+impact.avgDays+' days')); set('precedentValue',impact.precedentDays+' '+t('zile','days')); set('meaningTitle',t('CE ÎNSEAMNĂ?','WHAT DOES IT MEAN?')); set('dayLabel',t('ZIUA','DAY')); set('dayNumber',impact.day||'–'); set('warningLine1',impact.warning1||''); set('warningLine2',impact.warning2||''); set('footerLine',impact.footer||''); set('chartTitle',t('Grafic structural real','Real structural chart')); set('chartNote',t('Date reale din monitor, nu grafic decorativ','Real monitor data, not decorative chart')); var list=document.getElementById('meaningList'); if(list){list.innerHTML=(impact.bullets||[]).map(function(b){return '<div class="bullet">• <span>'+b+'</span></div>'}).join('')} buildRealChart(state||{});}
async function getJson(url){var r=await fetch(url+'?t='+Date.now(),{cache:'no-store'}); if(!r.ok) throw new Error(url); return r.json()}
async function start(){buildClock(); try{var res=await Promise.all([getJson('../risk_window.json'),getJson('../coeziv_state.json')]); var risk=res[0],state=res[1]; var engine=window.CohesivXImpactEngine; if(!engine) throw new Error('impact engine missing'); renderImpact(engine.decide(risk,state),state);}catch(e){document.body.innerHTML='<div style="padding:24px;color:#fff;background:#040810;min-height:100vh;font-family:Rajdhani,Arial"><a href="../mecanism.html" style="color:#7fd9ff">← BTC Monitor</a><div class="error">Impact page error: '+String(e.message||e)+'</div></div>';}}
start(); setInterval(buildClock,60000);
})();
</script>
</body>
</html>
