<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CohesivX BTC — Impactul zilei</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;800;900&display=swap');
:root{--bg:#040810;--line:rgba(57,201,255,.32);--cyan:#7fd9ff;--gold:#ffb23e;--red:#ff6b6b;--green:#37e08a;--text:#eef4fb;--muted:#9db2c9}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 90% 0,rgba(57,201,255,.12),transparent 36%),linear-gradient(180deg,#04101d,#02060d);color:var(--text);font-family:Rajdhani,Arial,sans-serif;padding:24px}.page{max-width:760px;margin:auto;background-image:linear-gradient(rgba(57,201,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(57,201,255,.06) 1px,transparent 1px);background-size:34px 34px}.back{display:inline-block;color:var(--cyan);font-size:22px;margin:0 0 22px}.hero{display:flex;justify-content:space-between;gap:12px}.h1{font-family:Orbitron,sans-serif;font-size:clamp(38px,11vw,72px);line-height:.94;font-weight:900;text-transform:uppercase}.h1 .accent{display:block;background:linear-gradient(90deg,#ffbf56,#ff7a1a);-webkit-background-clip:text;background-clip:text;color:transparent}.clock{width:112px;min-width:82px}.badge{display:inline-block;margin:18px 0 14px;padding:8px 18px;border:2px solid var(--cyan);border-radius:8px;color:var(--cyan);font-size:23px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.lead{font-size:24px;line-height:1.35;color:#c7d5e5;max-width:610px}.card{margin:26px 0;padding:20px;border:1px solid var(--line);border-radius:18px;background:rgba(3,8,18,.72)}.section-title{color:var(--cyan);font-size:29px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}.note{color:#b8c7d8;font-size:18px;font-weight:700;margin-bottom:10px}.chart svg{width:100%;height:auto;display:block}.big-note{text-align:right;color:var(--cyan);font-size:28px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}.row{display:flex;justify-content:space-between;gap:14px;align-items:center;border:1px solid rgba(127,217,255,.18);border-radius:14px;padding:14px 18px;margin:12px 0;font-size:25px;font-weight:800}.row .v{color:var(--cyan)}.row .gold{color:var(--gold)}.bullets{font-size:23px;line-height:1.35}.bullet{margin:12px 0}.day{border:2px solid #39c9ff;border-radius:20px;text-align:center;padding:22px;margin:26px 0}.day .label{font-size:26px;font-weight:900;letter-spacing:.12em}.day .num{font-family:Orbitron,sans-serif;font-size:96px;color:var(--gold);line-height:1}.warn{border-color:rgba(255,107,107,.75);text-align:center;font-size:25px;font-weight:900}.warn .red{color:var(--red);margin-top:12px}.footer{border-color:rgba(255,178,62,.8);font-size:28px;text-align:center;font-weight:900}.error{border:1px solid var(--red);border-radius:18px;padding:18px;color:#ffd1d1;font-size:22px;background:rgba(255,107,107,.08)}@media(max-width:520px){body{padding:18px}.lead{font-size:22px}.row{font-size:23px}.big-note{text-align:left;font-size:24px}.clock{width:90px}}
</style>
</head>
<body>
<div class="page">
<a class="back" id="backLink" href="../mecanism.html">← Înapoi la BTC Monitor</a>
<div class="hero"><div><div class="h1"><span id="titleA">IMPACTUL</span><span class="accent" id="titleB">ZILEI</span></div><div class="badge" id="badgeText">SE ÎNCARCĂ</div><div class="lead" id="leadText">Datele se actualizează.</div></div><div class="clock" id="clockWrap"></div></div>
<div class="card chart"><div class="section-title" id="chartTitle">Grafic structural real</div><div class="note" id="chartNote">Date reale din monitor, nu grafic decorativ</div><div id="chartCard"></div></div>
<div class="big-note" id="structuralNote">TIMPUL STRUCTURAL NU AȘTEAPTĂ.</div>
<div class="card"><div class="section-title" id="contextTitle">CONTEXT VS. ISTORIC</div><div class="row"><span id="histLabel">Istoric 2018+</span><span class="v" id="histAvgValue">–</span></div><div class="row"><span id="precedentLabel">Precedent 2026</span><span class="gold" id="precedentValue">–</span></div></div>
<div class="card"><div class="section-title" id="meaningTitle">CE ÎNSEAMNĂ?</div><div class="bullets" id="meaningList"></div></div>
<div class="day"><div class="label" id="dayLabel">ZIUA</div><div class="num" id="dayNumber">–</div></div>
<div class="card warn"><div id="warningLine1">–</div><div class="red" id="warningLine2">–</div></div>
<div class="card footer" id="footerLine">–</div>
</div>
<script src="./impact-engine.js?v=2"></script>
<script>
(function(){
var KEY='coeziv_btc_lang';function isEn(){try{return localStorage.getItem(KEY)==='en'||document.documentElement.lang==='en'}catch(e){return false}}function tx(ro,en){return isEn()?en:ro}function set(id,v){var e=document.getElementById(id);if(e)e.textContent=v||''}function money(v){var n=Number(v);return Number.isFinite(n)?'$'+Math.round(n).toLocaleString('en-US'):'–'}
function clock(){var w=document.getElementById('clockWrap'),now=new Date(),hr=(now.getHours()%12+now.getMinutes()/60)*30,min=now.getMinutes()*6;if(!w)return;w.innerHTML='<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="47" fill="rgba(6,12,22,.6)" stroke="#39c9ff" stroke-width="1.5"/><circle cx="50" cy="50" r="41" fill="none" stroke="#39c9ff" stroke-width=".6" opacity=".4"/><line x1="50" y1="50" x2="'+(50+Math.sin(hr*Math.PI/180)*22)+'" y2="'+(50-Math.cos(hr*Math.PI/180)*22)+'" stroke="#eef4fb" stroke-width="2.4" stroke-linecap="round"/><line x1="50" y1="50" x2="'+(50+Math.sin(min*Math.PI/180)*32)+'" y2="'+(50-Math.cos(min*Math.PI/180)*32)+'" stroke="#39c9ff" stroke-width="1.8" stroke-linecap="round"/><circle cx="50" cy="50" r="2.4" fill="#ffb23e"/></svg>'}
function points(state){var out=[];(state.signal_history||[]).forEach(function(x,i){var p=Number(x.price_usd||x.ic_close_usd||x.model_price_usd);if(Number.isFinite(p))out.push({label:String((x.timestamp||x.date||i+1)).slice(5,10),price:p})});var cur=Number(state.price_usd||state.ic_close_usd);if(Number.isFinite(cur))out.push({label:tx('acum','now'),price:cur});return out.slice(-18)}
function chart(state){var root=document.getElementById('chartCard'),pts=points(state||{});if(!root)return;if(pts.length<2){root.innerHTML='<div class="error">'+tx('Nu sunt suficiente puncte pentru grafic real.','Not enough points for a real chart.')+'</div>';return}var W=720,H=330,L=54,R=34,T=36,B=48,w=W-L-R,h=H-T-B,bands=state.model_price_bands||{},lower=Number(bands.p10||bands.lower),model=Number(state.model_price_usd),prices=pts.map(function(p){return p.price});if(Number.isFinite(lower))prices.push(lower);if(Number.isFinite(model))prices.push(model);var min=Math.min.apply(null,prices),max=Math.max.apply(null,prices),pad=(max-min)*.12||1000;min-=pad;max+=pad;function X(i){return L+i/(pts.length-1)*w}function Y(v){return T+(max-v)/(max-min)*h}var g='';for(var i=0;i<5;i++){var yy=T+i*h/4;g+='<line x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'" stroke="rgba(127,217,255,.09)"/><text x="'+(W-R)+'" y="'+(yy-5)+'" fill="#7f94aa" font-size="11" text-anchor="end">'+money(max-i/4*(max-min))+'</text>'}function hline(v,c,l){if(!Number.isFinite(v))return'';var yy=Y(v);return'<line x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'" stroke="'+c+'" stroke-width="1.3" stroke-dasharray="7 7"/><text x="'+(L+2)+'" y="'+(yy-7)+'" fill="'+c+'" font-size="12" font-weight="700">'+l+' '+money(v)+'</text>'}var path=pts.map(function(p,i){return(i?'L':'M')+X(i)+' '+Y(p.price)}).join(' '),area=path+' L '+X(pts.length-1)+' '+(H-B)+' L '+X(0)+' '+(H-B)+' Z',cir=pts.map(function(p,i){return'<circle cx="'+X(i)+'" cy="'+Y(p.price)+'" r="'+(i===pts.length-1?5:3.2)+'" fill="'+(i===pts.length-1?'#ffb23e':'#37e08a')+'"/>'}).join(''),last=pts[pts.length-1];root.innerHTML='<svg viewBox="0 0 '+W+' '+H+'">'+g+hline(model,'#7fd9ff','Model')+hline(lower,'#ff6b6b',tx('Bandă jos','Lower band'))+'<path d="'+area+'" fill="rgba(57,201,255,.08)"/><path d="'+path+'" fill="none" stroke="#39c9ff" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>'+cir+'<text x="'+(W-R)+'" y="'+(Y(last.price)-12)+'" fill="#ffb23e" font-size="14" font-weight="800" text-anchor="end">'+tx('Curent','Current')+' '+money(last.price)+'</text><text x="'+L+'" y="'+(H-17)+'" fill="#9db2c9" font-size="12">'+pts[0].label+'</text><text x="'+(W-R)+'" y="'+(H-17)+'" fill="#9db2c9" font-size="12" text-anchor="end">'+last.label+'</text></svg>'}
function render(impact,state){document.documentElement.lang=isEn()?'en':'ro';set('backLink',impact.backText);var words=(impact.title||'').split(' '),mid=Math.ceil(words.length/2);set('titleA',words.slice(0,mid).join(' '));set('titleB',words.slice(mid).join(' ')||impact.title);set('badgeText',impact.badge);set('leadText',impact.pageLead||impact.subtitle);set('chartTitle',tx('Grafic structural real','Real structural chart'));set('chartNote',tx('Date reale din monitorul production, nu grafic decorativ','Real production monitor data, not decorative chart'));set('structuralNote',tx('TIMPUL STRUCTURAL NU AȘTEAPTĂ.','STRUCTURAL TIME DOES NOT WAIT.'));set('contextTitle',impact.contextTitle);set('histLabel',tx('Istoric 2018+','History 2018+'));set('precedentLabel',tx('Precedent 2026','2026 precedent'));set('histAvgValue',tx('medie ~'+impact.avg+' zile','average ~'+impact.avg+' days'));set('precedentValue',impact.precedent+' '+tx('zile','days'));set('meaningTitle',impact.meaningTitle);set('dayLabel',tx('ZIUA','DAY'));set('dayNumber',impact.day);set('warningLine1',impact.warning1);set('warningLine2',impact.warning2);set('footerLine',impact.footer);var list=document.getElementById('meaningList');if(list)list.innerHTML=(impact.meaning||[]).map(function(b){return'<div class="bullet">• '+b+'</div>'}).join('');chart(state||{})}
async function start(){clock();try{var engine=window.CohesivXImpactEngine;if(!engine)throw new Error('impact engine missing');var raw=await engine.loadRaw('../');render(engine.decide(raw[0],raw[1]),raw[1])}catch(e){document.body.innerHTML='<div style="padding:24px;color:#fff;background:#040810;min-height:100vh;font-family:Rajdhani,Arial"><a href="../mecanism.html" style="color:#7fd9ff">← BTC Monitor</a><div class="error">Impact page error: '+String(e.message||e)+'</div></div>'}}
start();setInterval(clock,60000);
})();
</script>
</body>
</html>
