<!DOCTYPE html>
<html lang="ro">
<head>

<title>Tactica s-a schimbat — CohesivX BTC Monitor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#040810;--bg2:#060c18;--panel:#081120;--panel-border:rgba(64,180,255,.35);--cyan:#39c9ff;--cyan-soft:#7fd9ff;--gold:#ffb23e;--gold2:#ff7a1a;--red:#ff3b3b;--red-soft:#ff6b6b;--green:#37e08a;--text:#eef4fb;--muted:#9db2c9}*{box-sizing:border-box;margin:0;padding:0}body{background:radial-gradient(ellipse 900px 500px at 85% 8%,rgba(57,201,255,.10),transparent 60%),radial-gradient(ellipse 700px 500px at 10% 90%,rgba(255,122,26,.08),transparent 60%),linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text);font-family:Inter,sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 12px}.page{width:100%;max-width:760px;position:relative}.page:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(57,201,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(57,201,255,.05) 1px,transparent 1px);background-size:34px 34px;mask-image:radial-gradient(ellipse 100% 100% at 50% 0%,black 0%,transparent 75%);pointer-events:none;z-index:0}.content{position:relative;z-index:1}.back{display:inline-flex;align-items:center;gap:7px;margin:0 0 16px;text-decoration:none;color:#bffcff;border:1px solid rgba(57,201,255,.42);border-radius:999px;padding:8px 13px;background:rgba(8,17,32,.72);font-family:Rajdhani,sans-serif;font-weight:800;letter-spacing:.05em}.back:hover{border-color:var(--gold);color:#ffd27a}header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding-top:8px}.title-block{flex:1;min-width:0}h1.line1,h1.line2{font-family:Orbitron,sans-serif;font-weight:900;font-size:clamp(38px,9vw,58px);line-height:.92;letter-spacing:1px}.line1{color:#f2f6fb;text-shadow:0 0 22px rgba(200,220,255,.25)}.line2{background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 60%,#ff5b1a 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(255,140,30,.35);margin-bottom:14px}.badge{display:inline-block;font-family:Rajdhani,sans-serif;font-weight:700;letter-spacing:2px;font-size:clamp(17px,4vw,22px);color:var(--cyan-soft);border:1.5px solid var(--cyan);padding:6px 18px;border-radius:6px;box-shadow:0 0 18px rgba(57,201,255,.25),inset 0 0 12px rgba(57,201,255,.08);margin-bottom:12px}.subtitle{font-family:Rajdhani,sans-serif;font-weight:600;font-size:clamp(14px,3.4vw,17px);color:var(--muted)}.subtitle b{color:var(--cyan-soft);font-weight:700}.subtitle .accent{color:var(--gold);font-weight:700}.clock-wrap{flex-shrink:0;width:clamp(88px,22vw,130px);height:clamp(88px,22vw,130px);position:relative}.clock-wrap svg{width:100%;height:100%;filter:drop-shadow(0 0 14px rgba(57,201,255,.35))}.chart-card{margin-top:22px;position:relative;border:1px solid rgba(57,201,255,.18);border-radius:10px;overflow:hidden;background:linear-gradient(180deg,rgba(8,17,32,.7),rgba(4,8,16,.9))}.chart-card svg{display:block;width:100%;height:auto}.tag{font-family:Rajdhani,sans-serif;font-weight:700;font-size:18px;letter-spacing:1px}.tag-high{fill:var(--cyan-soft)}.tag-low{fill:var(--red-soft)}.structural-note{margin-top:16px;text-align:right;font-family:Rajdhani,sans-serif;font-weight:700;font-size:clamp(15px,3.6vw,18px);color:var(--cyan-soft);letter-spacing:.5px;line-height:1.3}.grid{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:600px){.grid{grid-template-columns:1fr}}.panel{border:1px solid var(--panel-border);border-radius:10px;background:rgba(8,15,28,.55);padding:16px 16px 18px}.panel-title{display:flex;align-items:center;gap:8px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:16px;letter-spacing:1px;color:var(--cyan-soft);margin-bottom:12px}.panel-title .ico{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--cyan);border-radius:50%;font-size:12px}.row{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid rgba(57,201,255,.15);border-radius:7px;margin-bottom:8px;font-family:Rajdhani,sans-serif;font-size:15px;font-weight:600;color:var(--text)}.row .value{margin-left:auto;font-weight:700}.row .blue{color:var(--cyan-soft)}.row .gold{color:var(--gold)}.bullet{display:flex;gap:9px;align-items:flex-start;font-family:Rajdhani,sans-serif;font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:9px;line-height:1.35}.bullet .dot{flex-shrink:0;margin-top:1px}.red{color:var(--red-soft);font-weight:700}.gold{color:var(--gold);font-weight:700}.green{color:var(--green);font-weight:700}.right-col{display:flex;flex-direction:column;gap:16px}.day-box{border:1.5px solid var(--cyan);border-radius:10px;text-align:center;padding:16px 10px 18px;box-shadow:0 0 24px rgba(57,201,255,.15),inset 0 0 20px rgba(57,201,255,.05);position:relative}.day-label{font-family:Rajdhani,sans-serif;font-weight:700;font-size:20px;letter-spacing:2px;color:#e8f4ff}.day-number{font-family:Orbitron,sans-serif;font-weight:900;font-size:clamp(60px,14vw,84px);line-height:1;background:linear-gradient(180deg,#ffd27a,var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(255,150,30,.35)}.warning-box{border:1.5px solid var(--red);border-radius:10px;text-align:center;padding:18px 14px;box-shadow:0 0 24px rgba(255,59,59,.15),inset 0 0 18px rgba(255,59,59,.05)}.warning-icon{width:34px;height:34px;margin:0 auto 8px;color:var(--red)}.warning-box p{font-family:Rajdhani,sans-serif;font-weight:700;font-size:16.5px;line-height:1.3;color:#f2f2f2}.warning-box p.emph{color:var(--red-soft);margin-top:6px;font-size:17px}.footer-bar{margin-top:18px;border:1.5px solid var(--gold);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 0 22px rgba(255,178,62,.15),inset 0 0 16px rgba(255,178,62,.06)}.footer-bar .hourglass{font-size:30px;flex-shrink:0}.footer-bar p{font-family:Rajdhani,sans-serif;font-weight:700;font-size:clamp(15px,3.8vw,19px);letter-spacing:.3px}.brand{margin-top:20px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:Rajdhani,sans-serif;font-weight:700;font-size:15px;color:var(--muted);letter-spacing:.5px;padding-bottom:8px}.brand svg{width:20px;height:20px}.brand .sep{color:rgba(157,178,201,.4)}.brand .sub{color:var(--cyan-soft)}
</style>
</head>
<body>
<div class="page"><div class="content"><a id="backLink" class="back" href="../mecanism.html">← Înapoi la BTC Monitor</a><header><div class="title-block"><h1 class="line1" id="titleLine1">TACTICA</h1><h1 class="line2" id="titleLine2">S-A SCHIMBAT</h1><div class="badge" id="badgeText">RANGE PRELUNGIT</div><div class="subtitle" id="subtitleText"></div></div><div class="clock-wrap" id="clockWrap"></div></header><div class="chart-card" id="chartCard"></div><div class="structural-note" id="structuralNote"></div><div class="grid"><div class="left-col"><div class="panel"><div class="panel-title"><span class="ico">◎</span><span id="contextTitle"></span></div><div class="row"><span>📅</span><span id="histLabelPrefix"></span> <span id="histYearLabel"></span>: <span class="value blue" id="histAvgValue"></span></div><div class="row"><span>🕐</span><span id="precedentLabelPrefix"></span> <span id="precedentYearLabel"></span>: <span class="value gold" id="precedentValue"></span></div></div><div class="panel" style="margin-top:16px"><div class="panel-title"><span class="ico">🧠</span><span id="meaningTitle"></span></div><div class="bullet"><span class="dot">↓</span><span id="bullet1a"></span> <span class="red" id="bullet1b"></span></div><div class="bullet"><span class="dot">↻</span><span id="bullet2a"></span> → <span class="gold" id="bullet2b"></span></div><div class="bullet"><span class="dot">↑</span><span id="bullet3a"></span>: <span class="green" id="bullet3b"></span></div></div></div><div class="right-col"><div class="day-box"><div class="day-label" id="dayLabel"></div><div class="day-number" id="dayNumber">–</div></div><div class="warning-box"><svg class="warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 L22 20 L2 20 Z" stroke-linejoin="round"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.9" fill="currentColor" stroke="none"/></svg><p id="warningLine1"></p><p class="emph" id="warningLine2"></p></div></div></div><div class="footer-bar"><span class="hourglass">⏳</span><p id="footerLine"></p></div><div class="brand"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L22 8 L12 14 L2 8 Z" fill="#39c9ff" opacity="0.85"/><path d="M12 10 L22 16 L12 22 L2 16 Z" fill="#ffb23e" opacity="0.85"/></svg>CohesivX <span class="sep">|</span> <span class="sub">BTC Monitor</span></div></div></div>
<script>
const LANG_KEY='coeziv_btc_lang';
const CONFIG={rangeHighLabel:'70K–75K',rangeLowLabel:'59.5K',numCandles:34,randomSeed:7};
let DATA={risk:null,state:null};
const TEXT={
  ro:{title:'Tactica s-a schimbat — CohesivX BTC Monitor',back:'← Înapoi la BTC Monitor',t1:'TACTICA',t2:'S-A SCHIMBAT',badge:'RANGE PRELUNGIT',subtitle:'Context <b>structural</b>. Analiză <span class="accent">profundă</span>. Decizii <b>mai bune</b>.',note:'TIMPUL<br>STRUCTURAL<br>NU AȘTEAPTĂ.',ctx:'CONTEXT VS. ISTORIC',hist:'Istoric',avg:'medie ~{avg} zile',prev:'Precedent',prevVal:'{days} zile',meaning:'CE ÎNSEAMNĂ?',b1a:'Structura s-a prelungit',b1b:'peste media istorică',b2a:'Modelele vechi',b2b:'semnale înșelătoare',b3a:'Noua tactică',b3b:'răbdare + adaptare + disciplină',day:'ZIUA',warn1:'MEDIA ISTORICĂ A FOST DEPĂȘITĂ CA PRAG TACTIC.',warn2:'PRECEDENTUL 2026 RĂMÂNE REPERUL MAJOR.',foot:'PIAȚA A ÎNVĂȚAT SĂ STEA <span class="accent">MAI MULT</span> ÎN MECANISM.'},
  en:{title:'The tactic has changed — CohesivX BTC Monitor',back:'← Back to BTC Monitor',t1:'TACTIC',t2:'HAS CHANGED',badge:'EXTENDED RANGE',subtitle:'<b>Structural</b> context. <span class="accent">Deep</span> analysis. <b>Better</b> decisions.',note:'STRUCTURAL<br>TIME<br>DOES NOT WAIT.',ctx:'CONTEXT VS. HISTORY',hist:'History',avg:'average ~{avg} days',prev:'Precedent',prevVal:'{days} days',meaning:'WHAT DOES IT MEAN?',b1a:'The structure has extended',b1b:'beyond the historical average',b2a:'Old models',b2b:'misleading signals',b3a:'New tactic',b3b:'patience + adaptation + discipline',day:'DAY',warn1:'THE HISTORICAL AVERAGE HAS BEEN BROKEN AS A TACTICAL THRESHOLD.',warn2:'THE 2026 PRECEDENT REMAINS THE MAJOR REFERENCE.',foot:'THE MARKET HAS LEARNED TO STAY <span class="accent">LONGER</span> INSIDE THE MECHANISM.'}
};
function lang(){try{return localStorage.getItem(LANG_KEY)==='en'?'en':'ro'}catch(e){return'ro'}}
function by(id){return document.getElementById(id)}
function txt(id,v){const e=by(id);if(e)e.textContent=v}
function html(id,v){const e=by(id);if(e)e.innerHTML=v}
function days(){const r=DATA.risk||{};return r.since_2025_12_summary?.current_streak_days||r.legacy_risk_window?.consecutive_degradation_days||r.consecutive_degradation_days||r.streak_days||'–'}
function avg(){const r=DATA.risk||{};return Math.round(r.legacy_risk_window?.average_days_to_confirmation||r.average_days_to_confirmation||41)}
function prev(){const r=DATA.risk||{};return r.since_2025_12_summary?.max_streak_days||74}
function applyText(){const l=lang(),t=TEXT[l];document.documentElement.lang=l;document.title=t.title;txt('backLink',t.back);txt('titleLine1',t.t1);txt('titleLine2',t.t2);txt('badgeText',t.badge);html('subtitleText',t.subtitle);html('structuralNote',t.note);txt('contextTitle',t.ctx);txt('histLabelPrefix',t.hist);txt('histYearLabel','2018+');txt('histAvgValue',t.avg.replace('{avg}',avg()));txt('precedentLabelPrefix',t.prev);txt('precedentYearLabel','2026');txt('precedentValue',t.prevVal.replace('{days}',prev()));txt('meaningTitle',t.meaning);txt('bullet1a',t.b1a);txt('bullet1b',t.b1b);txt('bullet2a',t.b2a);txt('bullet2b',t.b2b);txt('bullet3a',t.b3a);txt('bullet3b',t.b3b);txt('dayLabel',t.day);txt('dayNumber',days());txt('warningLine1',t.warn1);txt('warningLine2',t.warn2);html('footerLine',t.foot)}
function buildClock(){const wrap=by('clockWrap'),now=new Date(),hr=(now.getHours()%12+now.getMinutes()/60)*30,min=now.getMinutes()*6;wrap.innerHTML=`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="47" fill="rgba(6,12,22,.6)" stroke="#39c9ff" stroke-width="1.5"/><circle cx="50" cy="50" r="41" fill="none" stroke="#39c9ff" stroke-width="0.6" opacity="0.4"/>${Array.from({length:12}).map((_,i)=>{const a=i*30*Math.PI/180,x1=50+Math.sin(a)*38,y1=50-Math.cos(a)*38,x2=50+Math.sin(a)*34,y2=50-Math.cos(a)*34;return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#7fd9ff" stroke-width="1"/>`}).join('')}<line x1="50" y1="50" x2="${50+Math.sin(hr*Math.PI/180)*22}" y2="${50-Math.cos(hr*Math.PI/180)*22}" stroke="#eef4fb" stroke-width="2.4" stroke-linecap="round"/><line x1="50" y1="50" x2="${50+Math.sin(min*Math.PI/180)*32}" y2="${50-Math.cos(min*Math.PI/180)*32}" stroke="#39c9ff" stroke-width="1.8" stroke-linecap="round"/><circle cx="50" cy="50" r="2.4" fill="#ffb23e"/></svg>`}
function mulberry32(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function buildChart(low=59500,high=75000){const W=720,H=360,rand=mulberry32(CONFIG.randomSeed),n=CONFIG.numCandles,padTop=40,padBottom=30,chartH=H-padTop-padBottom,priceTop=high*1.03,priceBottom=low*.97,priceToY=p=>padTop+(priceTop-p)/(priceTop-priceBottom)*chartH,yHigh=priceToY(high),yLow=priceToY(low);let candles=[],price=(high+low)/2;for(let i=0;i<n;i++){const drift=(rand()-.5)*(high-low)*.16;price=Math.min(priceTop*.995,Math.max(priceBottom*1.005,price+drift));const open=price,close=price+(rand()-.5)*(high-low)*.10,hi=Math.max(open,close)+rand()*(high-low)*.04,lo=Math.min(open,close)-rand()*(high-low)*.04;candles.push({open,close,hi,lo});price=close}const cw=(W-40)/n,cs=candles.map((c,i)=>{const x=20+i*cw+cw*.15,w=cw*.7,yO=priceToY(c.open),yC=priceToY(c.close),yH=priceToY(c.hi),yL=priceToY(c.lo),bull=c.close>=c.open,color=bull?'#37e08a':'#ff5b5b',top=Math.min(yO,yC),h=Math.max(2,Math.abs(yC-yO));return `<line x1="${x+w/2}" y1="${yH}" x2="${x+w/2}" y2="${yL}" stroke="${color}" stroke-width="1.4" opacity=".85"/><rect x="${x}" y="${top}" width="${w}" height="${h}" fill="${color}" opacity=".85" rx=".6"/>`}).join(''),p1=W*.20,p2=W*.5,p3=W*.80,bTop=padTop-6,path=`M ${p1} ${yLow} Q ${(p1+p2)/2} ${bTop-30} ${p2} ${bTop} Q ${(p2+p3)/2} ${bTop-30} ${p3} ${yLow}`;by('chartCard').innerHTML=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="coinGrad" cx="35%" cy="30%" r="75%"><stop offset="0%" stop-color="#ffe3a3"/><stop offset="45%" stop-color="#ffb23e"/><stop offset="100%" stop-color="#e0700f"/></radialGradient><filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>${cs}<line x1="10" y1="${yHigh}" x2="${W-10}" y2="${yHigh}" stroke="#39c9ff" stroke-width="1.6" stroke-dasharray="3 4" filter="url(#glowCyan)"/><text class="tag tag-high" x="16" y="${yHigh-10}">${CONFIG.rangeHighLabel}</text><line x1="10" y1="${yLow}" x2="${W-10}" y2="${yLow}" stroke="#ff3b3b" stroke-width="1.6" stroke-dasharray="3 4" filter="url(#glowRed)"/><text class="tag tag-low" x="16" y="${yLow+22}">${CONFIG.rangeLowLabel}</text><path d="${path}" fill="none" stroke="#ff9d3e" stroke-width="2" opacity=".55"/><circle cx="${p1}" cy="${yLow}" r="5" fill="#ff3b3b" filter="url(#glowRed)"/><circle cx="${p3}" cy="${yLow}" r="5" fill="#ff3b3b" filter="url(#glowRed)"/><g><circle cx="${p2}" cy="${bTop+2}" r="30" fill="url(#coinGrad)" filter="url(#glowCyan)"/><circle cx="${p2}" cy="${bTop+2}" r="30" fill="none" stroke="#ffdca0" stroke-width="1.5" opacity=".7"/><text x="${p2}" y="${bTop+12}" text-anchor="middle" font-family="Orbitron, sans-serif" font-weight="800" font-size="26" fill="#7a3d00">₿</text></g></svg>`}
async function load(){try{const [risk,state]=await Promise.all([fetch('../risk_window.json',{cache:'no-store'}).then(r=>r.json()),fetch('../coeziv_state.json',{cache:'no-store'}).then(r=>r.json())]);DATA={risk,state};const bands=state.model_price_bands||{},low=bands.p10||59500,high=Math.max((state.price_usd||64500)*1.12,75000);CONFIG.rangeLowLabel=low<1000?String(low):`${(low/1000).toFixed(low>=100000?0:1)}K`;buildChart(low,high)}catch(e){buildChart()}applyText()}
buildClock();load();window.addEventListener('storage',e=>{if(e.key===LANG_KEY)applyText()});setInterval(applyText,700);
</script>
</body>
