name: BTC Structural Memory

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Coeziv BTC Backtest
    types:
      - completed

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  structural_memory:
    name: Generate BTC structural memory
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Generate structural memory only
        run: |
          python structural_memory.py

      - name: Verify memorie page source file
        run: |
          test -f btc-swing-strategy/memorie.html
          test -f btc-swing-strategy/risk_window_history.json
          python -m json.tool btc-swing-strategy/risk_window_history.json > /tmp/risk_window_history.check.json

      - name: Show structural memory snapshot
        run: |
          cat btc-swing-strategy/risk_window_history.json

      - name: Commit structural memory if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/risk_window_history.json btc-swing-strategy/memorie.html
          if git diff --cached --quiet; then
            echo "No structural memory changes to commit."
          else
            git commit -m "Update BTC structural memory"
            git push
          fi

      - name: Upload structural memory artifact
        uses: actions/upload-artifact@v4
        with:
          name: btc-structural-memory
          path: |
            btc-swing-strategy/risk_window_history.json
            btc-swing-strategy/memorie.html
          if-no-files-found: error
