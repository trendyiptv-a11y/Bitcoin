name: CohesivX Profit Watcher

on:
  schedule:
    # Redundant schedule: GitHub scheduled runs can be delayed or skipped.
    # Run every 15 minutes on off-peak minutes; the watcher itself has a cooldown
    # before triggering any sell/main-bot action, so this improves monitoring without overtrading.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "profit_watcher.py"
      - "profit_exit_executor.py"
      - "paper_profit_overlay_experiment.py"
      - "paper_trader_adaptive.py"
      - ".github/workflows/profit-watcher.yml"
      - "btc-swing-strategy/paper_trading_state.json"
      - "btc-swing-strategy/coeziv_state.json"

permissions:
  contents: write
  actions: write

concurrency:
  group: cohesivx-profit-watcher
  cancel-in-progress: false

jobs:
  profit-watcher:
    name: Watch adaptive paper profit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Run profit watcher
        id: watcher
        run: python profit_watcher.py

      - name: Run experimental profit overlay
        run: python paper_profit_overlay_experiment.py

      - name: Execute stale-safe profit exit
        if: steps.watcher.outputs.trigger_profit_exit == 'true'
        run: python profit_exit_executor.py

      - name: Commit profit watcher state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/profit_watch_signal.json || true
          git add btc-swing-strategy/paper_profit_overlay_experiment_state.json || true
          git add btc-swing-strategy/paper_profit_overlay_experiment_report.json || true
          git add btc-swing-strategy/paper_profit_overlay_experiment_log.jsonl || true
          git add btc-swing-strategy/paper_trading_state.json || true
          git add btc-swing-strategy/paper_trading_log.csv || true
          git add btc-swing-strategy/paper_trader_decision.json || true
          git commit -m "Update CohesivX profit watcher state" || echo "Nothing to commit"
          git push origin main || echo "Push failed; will retry on next run"

      - name: Trigger main paper trader on fresh-state profit signal
        if: steps.watcher.outputs.trigger_paper_trader == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Profit watcher trigger reason: ${{ steps.watcher.outputs.trigger_reason }}"
          gh workflow run paper-trader.yml --ref main
