name: Participation Cohesion Test

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Coeziv BTC Backtest
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: participation-cohesion-main
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Run participation cohesion test
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run participation cohesion test
        run: |
          python test_participation_cohesion.py

      - name: Show participation cohesion snapshot
        run: |
          cat data/participation_cohesion_test.json

      - name: Show participation cohesion card
        run: |
          cat btc-swing-strategy/participation_cohesion.json

      - name: Show participation cohesion history summary
        run: |
          cat data/participation_cohesion_history_summary.json

      - name: Commit participation cohesion data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/participation_cohesion.json
          if git diff --cached --quiet; then
            echo "No participation_cohesion.json changes to commit."
          else
            git commit -m "Update participation cohesion data"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi

      - name: Upload participation cohesion artifacts
        uses: actions/upload-artifact@v4
        with:
          name: participation-cohesion-test
          path: |
            data/participation_cohesion_test.json
            data/participation_cohesion_series.csv
            data/participation_cohesion_history_summary.json
            btc-swing-strategy/participation_cohesion.json
          if-no-files-found: error
