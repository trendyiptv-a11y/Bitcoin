name: CohesivX Paper Trader

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cohesivx-paper-trader
  cancel-in-progress: false

jobs:
  paper-trader:
    name: Run CohesivX paper trader
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Run paper trader
        run: python paper_trader.py

      - name: Commit paper trader state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/paper_trading_state.json || true
          git add btc-swing-strategy/paper_trading_log.csv || true
          git commit -m "Update CohesivX paper trader" || echo "Nothing to commit"
          git push origin main || echo "Push failed; will retry on next run"
