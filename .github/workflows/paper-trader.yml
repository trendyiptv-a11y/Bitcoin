name: CohesivX Paper Trader

on:
  schedule:
    # Global market-open rhythm, summer UTC schedule:
    # Tokyo +10 min      09:10 JST  = 00:10 UTC
    # Shanghai +10 min   09:40 CST  = 01:40 UTC
    # Euronext +10 min   09:10 CEST = 07:10 UTC
    # Nasdaq +10 min     09:40 EDT  = 13:40 UTC
    - cron: "10 0 * * *"
    - cron: "40 1 * * *"
    - cron: "10 7 * * *"
    - cron: "40 13 * * *"
  workflow_dispatch:
  push:
    paths:
      - "paper_trader.py"
      - ".github/workflows/paper-trader.yml"
      - "btc-swing-strategy/coeziv_state.json"

permissions:
  contents: write

concurrency:
  group: cohesivx-paper-trader
  cancel-in-progress: false

jobs:
  paper-trader:
    name: Run CohesivX paper trader
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Run paper trader
        run: python paper_trader.py

      - name: Commit paper trader state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/paper_trading_state.json || true
          git add btc-swing-strategy/paper_trading_log.csv || true
          git add btc-swing-strategy/paper_trader_decision.json || true
          git commit -m "Update CohesivX paper trader" || echo "Nothing to commit"
          git push origin main || echo "Push failed; will retry on next run"
