name: CohesivX Paper Backtest

on:
  workflow_dispatch:
  push:
    paths:
      - "backtest_cohesivx_paper.py"
      - ".github/workflows/backtest-cohesivx-paper.yml"
      - "ic_btc_series.json"
      - "data/ic_btc_series.json"
      - "j-btc-coeziv/ic_btc_series.json"
      - "btc-swing-strategy/ic_btc_series.json"

permissions:
  contents: write

concurrency:
  group: cohesivx-paper-backtest
  cancel-in-progress: false

jobs:
  backtest:
    name: Run CohesivX paper backtest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backtest
        run: python backtest_cohesivx_paper.py

      - name: Commit backtest report
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/backtest_report.json || true
          git add btc-swing-strategy/backtest_equity_curve.csv || true
          git commit -m "Update CohesivX paper backtest report" || echo "Nothing to commit"
          git push origin main || echo "Push failed; will retry on next manual run"
