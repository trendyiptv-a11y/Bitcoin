name: Move CohesivX theme toggle left

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-theme-position:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move theme toggle to left
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('btc-swing-strategy/mecanism.html')
          text = path.read_text(encoding='utf-8')
          original = text

          replacements = [
              ('justify-content:flex-end;', 'justify-content:flex-start;'),
              ('justify-content: flex-end;', 'justify-content: flex-start;'),
          ]

          for old, new in replacements:
              text = text.replace(old, new)

          if text != original:
              path.write_text(text, encoding='utf-8')
              print('theme toggle moved left')
          else:
              print('no change needed')
          PY

      - name: Commit patch if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/mecanism.html
          git commit -m "Move theme toggle left"
          git push
