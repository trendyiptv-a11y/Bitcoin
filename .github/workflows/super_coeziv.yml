name: coeziv_state - Generate snapshot BTC

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  coeziv_state:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update BTC state and UI
        run: |
          python coeziv_state_v2.py
          python risk_window.py
          python inject_structural_confirmation.py
          python patch_standard_regime_ui.py
          python patch_mecanism_model_price_ui.py

      - name: Clean pycache and pyc files
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} +
          find . -name "*.pyc" -delete

      - name: Auto-commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update BTC V2 state and UI"
          branch: main
          file_pattern: >
            btc-swing-strategy/risk_window.json
            btc-swing-strategy/risk_window_history.json
            btc-swing-strategy/coeziv_state.json
            btc-swing-strategy/mecanism.html
