name: Apply CohesivX theme status safe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch mecanism.html safely
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('btc-swing-strategy/mecanism.html')
          text = path.read_text(encoding='utf-8')
          original = text

          css = "\n".join([
              "",
              "    /* COHESIVX_THEME_TOGGLE_CSS */",
              "    body.light-mode {",
              "      --bg-main: #f8fafc;",
              "      --bg-card: rgba(255,255,255,0.96);",
              "      --border-card: #cbd5e1;",
              "      --text-main: #0f172a;",
              "      --text-muted: #475569;",
              "      --text-soft: #64748b;",
              "      --accent-bg-chip: rgba(255,255,255,0.9);",
              "      background:",
              "        radial-gradient(circle at 10% -10%, #e0f2fe 0, transparent 55%),",
              "        radial-gradient(circle at 90% 110%, #ffffff 0, #e2e8f0 60%);",
              "    }",
              "    body.light-mode .card { box-shadow: 0 18px 50px rgba(15,23,42,0.16); }",
              "    body.light-mode .card::before { opacity: .08; }",
              "    body.light-mode .history-row,",
              "    body.light-mode .daily-ai-item,",
              "    body.light-mode .risk-metric,",
              "    body.light-mode .participation-metric {",
              "      background: rgba(248,250,252,0.92);",
              "      border-color: rgba(148,163,184,0.55);",
              "    }",
              "    body.light-mode .daily-ai-state,",
              "    body.light-mode .risk-pill,",
              "    body.light-mode .participation-pill,",
              "    body.light-mode .fg-zone-pill,",
              "    body.light-mode .signal-chip,",
              "    body.light-mode .history-signal-chip { background: rgba(255,255,255,0.92); }",
              "    .top-controls { display:flex; justify-content:flex-end; align-items:center; margin:-2px 0 10px; gap:8px; }",
              "    .theme-toggle-btn {",
              "      border:1px solid rgba(56,189,248,0.65);",
              "      background:rgba(15,23,42,0.9);",
              "      color:#bae6fd;",
              "      border-radius:999px;",
              "      padding:6px 11px;",
              "      font-size:11px;",
              "      letter-spacing:.06em;",
              "      text-transform:uppercase;",
              "      cursor:pointer;",
              "      box-shadow:0 10px 24px rgba(0,0,0,0.28);",
              "    }",
              "    body.light-mode .theme-toggle-btn { background:rgba(255,255,255,0.95); color:#075985; box-shadow:0 8px 18px rgba(15,23,42,0.12); }",
              "    .daily-ai-timebox {",
              "      border-radius:14px;",
              "      border:1px solid rgba(56,189,248,0.32);",
              "      background:rgba(15,23,42,0.72);",
              "      padding:8px 10px;",
              "      margin:0 0 10px;",
              "      font-size:11px;",
              "      color:var(--text-muted);",
              "      line-height:1.45;",
              "    }",
              "    body.light-mode .daily-ai-timebox { background:rgba(248,250,252,0.92); border-color:rgba(14,165,233,0.35); }",
              "    .daily-ai-timebox strong { color:var(--text-main); font-weight:650; }",
          ])

          js = "\n".join([
              "",
              "    // COHESIVX_THEME_TOGGLE_JS",
              "    const THEME_STORAGE_KEY = 'cohesivxTheme';",
              "    const THEME_TOGGLE_EL = document.getElementById('theme-toggle');",
              "",
              "    function applyTheme(theme) {",
              "      const selected = theme === 'light' ? 'light' : 'dark';",
              "      document.body.classList.toggle('light-mode', selected === 'light');",
              "      if (THEME_TOGGLE_EL) {",
              "        THEME_TOGGLE_EL.textContent = selected === 'light' ? 'Light' : 'Dark';",
              "        THEME_TOGGLE_EL.setAttribute('aria-pressed', selected === 'light' ? 'true' : 'false');",
              "      }",
              "      try { localStorage.setItem(THEME_STORAGE_KEY, selected); } catch (_) {}",
              "    }",
              "",
              "    function initThemeToggle() {",
              "      let saved = 'dark';",
              "      try { saved = localStorage.getItem(THEME_STORAGE_KEY) || 'dark'; } catch (_) {}",
              "      applyTheme(saved);",
              "      if (THEME_TOGGLE_EL) {",
              "        THEME_TOGGLE_EL.addEventListener('click', () => {",
              "          const next = document.body.classList.contains('light-mode') ? 'dark' : 'light';",
              "          applyTheme(next);",
              "          setTimeout(() => { if (typeof renderChart === 'function') renderChart(); }, 80);",
              "        });",
              "      }",
              "    }",
              "",
              "    function formatAnalysisTime(iso) {",
              "      if (!iso) return 'n/a';",
              "      const d = new Date(iso);",
              "      if (Number.isNaN(d.getTime())) return 'n/a';",
              "      return d.toLocaleString('ro-RO', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', timeZoneName:'short' });",
              "    }",
              "",
              "    function updateDailyTimebox(data) {",
              "      const el = document.getElementById('daily-ai-timebox');",
              "      if (!el || !data) return;",
              "      const status = data.analysis_status === 'updated' ? 'actualizata' : (data.analysis_status || 'in verificare');",
              "      const last = formatAnalysisTime(data.last_analysis_at || data.generated_at);",
              "      const next = formatAnalysisTime(data.next_analysis_expected_at);",
              "      el.innerHTML = `<strong>Status analiza:</strong> ${status}<br>` + `<strong>Ultima analiza:</strong> ${last}<br>` + `<strong>Urmatoarea estimata:</strong> ${next}`;",
              "    }",
          ])

          if '/* COHESIVX_THEME_TOGGLE_CSS */' not in text:
              text = text.replace('\n  </style>', css + '\n  </style>')
          if 'COHESIVX_THEME_TOGGLE_BUTTON' not in text:
              text = text.replace('    <div class="title-bar">MECANISM COEZIV BTC</div>', '    <div class="title-bar">MECANISM COEZIV BTC</div>\n    <!-- COHESIVX_THEME_TOGGLE_BUTTON -->\n    <div class="top-controls">\n      <button id="theme-toggle" class="theme-toggle-btn" type="button" aria-label="Schimba tema aplicatiei">Dark</button>\n    </div>')
          if 'daily-ai-timebox' not in text:
              text = text.replace('        <div id="daily-ai-state" class="daily-ai-state">Se încarcă...</div>', '        <div id="daily-ai-state" class="daily-ai-state">Se încarcă...</div>\n        <div id="daily-ai-timebox" class="daily-ai-timebox">\n          <strong>Status analiza:</strong> se verifica ultima actualizare zilnica.\n        </div>')
          if 'COHESIVX_THEME_TOGGLE_JS' not in text:
              text = text.replace('    // DAILY_COHESIV_INTERPRETATION_JS', js + '\n\n    // DAILY_COHESIV_INTERPRETATION_JS')
          if 'updateDailyTimebox(data);' not in text:
              text = text.replace('      setText("daily-ai-state", data.general_state || data.status || "stare în curs de interpretare");', '      updateDailyTimebox(data);\n      setText("daily-ai-state", data.general_state || data.status || "stare în curs de interpretare");')
          if 'initThemeToggle();' not in text:
              text = text.replace('    function start() {\n      loadState();', '    function start() {\n      initThemeToggle();\n      loadState();')

          if text != original:
              path.write_text(text, encoding='utf-8')
              print('mecanism.html patched')
          else:
              print('mecanism.html already patched')
          PY

      - name: Commit patch if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/mecanism.html
          git commit -m "Add CohesivX theme toggle and status box"
          git push
