name: Apply CohesivX theme status safe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch mecanism.html safely
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          path = Path('btc-swing-strategy/mecanism.html')
          text = path.read_text(encoding='utf-8')
          original = text

          css_b64 = ''
          js_b64 = ''
          css = base64.b64decode(css_b64).decode('utf-8')
          js = base64.b64decode(js_b64).decode('utf-8')

          if '/* COHESIVX_THEME_TOGGLE_CSS */' not in text:
              text = text.replace('\n  </style>', css + '\n  </style>')
          if 'COHESIVX_THEME_TOGGLE_BUTTON' not in text:
              text = text.replace('    <div class="title-bar">MECANISM COEZIV BTC</div>', '    <div class="title-bar">MECANISM COEZIV BTC</div>\n    <!-- COHESIVX_THEME_TOGGLE_BUTTON -->\n    <div class="top-controls">\n      <button id="theme-toggle" class="theme-toggle-btn" type="button" aria-label="Schimbă tema aplicației">🌙 Dark</button>\n    </div>')
          if 'daily-ai-timebox' not in text:
              text = text.replace('        <div id="daily-ai-state" class="daily-ai-state">Se încarcă...</div>', '        <div id="daily-ai-state" class="daily-ai-state">Se încarcă...</div>\n        <div id="daily-ai-timebox" class="daily-ai-timebox">\n          <strong>Status analiză:</strong> se verifică ultima actualizare zilnică.\n        </div>')
          if 'COHESIVX_THEME_TOGGLE_JS' not in text:
              text = text.replace('    // DAILY_COHESIV_INTERPRETATION_JS', js + '\n\n    // DAILY_COHESIV_INTERPRETATION_JS')
          if 'updateDailyTimebox(data);' not in text:
              text = text.replace('      setText("daily-ai-state", data.general_state || data.status || "stare în curs de interpretare");', '      updateDailyTimebox(data);\n      setText("daily-ai-state", data.general_state || data.status || "stare în curs de interpretare");')
          if 'initThemeToggle();' not in text:
              text = text.replace('    function start() {\n      loadState();', '    function start() {\n      initThemeToggle();\n      loadState();')

          if text != original:
              path.write_text(text, encoding='utf-8')
              print('mecanism.html patched')
          else:
              print('mecanism.html already patched')
          PY

      - name: Commit patch if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/mecanism.html
          git commit -m "Add CohesivX theme toggle and status box"
          git push
