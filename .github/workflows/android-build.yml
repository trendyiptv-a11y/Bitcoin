name: Android Build - CohesivX BTC Monitor

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/cohesivx-btc-monitor/**'
      - 'patch_update1_premium_topbar.py'
      - '.github/workflows/android-build.yml'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply Update 1 premium top bar patch
        run: |
          python patch_update1_premium_topbar.py

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android/cohesivx-btc-monitor
        run: |
          gradle :app:assembleDebug

      - name: Build release AAB unsigned
        working-directory: android/cohesivx-btc-monitor
        run: |
          gradle :app:bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cohesivx-btc-monitor-debug-apk
          path: android/cohesivx-btc-monitor/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload unsigned release AAB
        uses: actions/upload-artifact@v4
        with:
          name: cohesivx-btc-monitor-release-aab-unsigned
          path: android/cohesivx-btc-monitor/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
