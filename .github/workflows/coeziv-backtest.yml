name: Coeziv BTC Backtest

on:
  workflow_dispatch:
  schedule:
    - cron: '10 7 * * *'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  backtest:
    name: Run isolated coeziv backtest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run coeziv backtest and build risk window
        run: |
          python backtest_coeziv.py

      - name: Patch mecanism HTML with risk window card
        run: |
          python patch_mecanism_risk_card.py

      - name: Restore mecanism core JS
        run: |
          python patch_mecanism_core_js.py

      - name: Patch mecanism HTML state fallback
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('btc-swing-strategy/mecanism.html')
          s = p.read_text(encoding='utf-8')
          helper = '''
              const STATE_URLS = ["coeziv_state.json", "./coeziv_state.json", "/btc-swing-strategy/coeziv_state.json", "/coeziv_state.json"];
              async function fetchJsonFallback(urls) {
                let lastError = null;
                for (const url of urls) {
                  try {
                    const res = await fetch(url + "?t=" + Date.now(), { cache: "no-store" });
                    if (!res.ok) { lastError = new Error("HTTP " + res.status + " " + url); continue; }
                    return await res.json();
                  } catch (e) { lastError = e; }
                }
                throw lastError || new Error("state routes failed");
              }
          '''
          if 'const STATE_URLS = [' not in s:
              s = s.replace('    const STATE_URL = "coeziv_state.json";', '    const STATE_URL = "coeziv_state.json";\n' + helper)
          old = '''        const res = await fetch(STATE_URL + "?t=" + Date.now(), { cache: "no-store" });
                  if (!res.ok) throw new Error("HTTP " + res.status);
                  const state = await res.json();'''
          old2 = '''        const res = await fetch(STATE_URL + "?t=" + Date.now(), { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const state = await res.json();'''
          new = '''        const state = await fetchJsonFallback(STATE_URLS);'''
          if old in s:
              s = s.replace(old, new)
          if old2 in s:
              s = s.replace(old2, new)
          p.write_text(s, encoding='utf-8')
          PY

      - name: Show risk window
        run: |
          cat btc-swing-strategy/risk_window.json

      - name: Commit risk window and HTML card if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/risk_window.json btc-swing-strategy/mecanism.html
          if git diff --cached --quiet; then
            echo "No risk_window.json or mecanism.html changes to commit."
          else
            git commit -m "Update coeziv risk window card"
            git push
          fi

      - name: Upload backtest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coeziv-backtest-results
          path: |
            data/coeziv_backtest_results.csv
            data/coeziv_backtest_summary.json
            btc-swing-strategy/risk_window.json
            btc-swing-strategy/mecanism.html
          if-no-files-found: error
