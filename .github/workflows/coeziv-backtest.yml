name: Coeziv BTC Backtest

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  backtest:
    name: Run isolated coeziv backtest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run coeziv backtest and build risk window
        run: |
          python backtest_coeziv.py

      - name: Patch mecanism HTML with risk window card
        run: |
          python patch_mecanism_risk_card.py

      - name: Show risk window
        run: |
          cat btc-swing-strategy/risk_window.json

      - name: Commit risk window and HTML card if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/risk_window.json btc-swing-strategy/mecanism.html
          if git diff --cached --quiet; then
            echo "No risk_window.json or mecanism.html changes to commit."
          else
            git commit -m "Update coeziv risk window card"
            git push
          fi

      - name: Upload backtest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coeziv-backtest-results
          path: |
            data/coeziv_backtest_results.csv
            data/coeziv_backtest_summary.json
            btc-swing-strategy/risk_window.json
            btc-swing-strategy/mecanism.html
          if-no-files-found: error
