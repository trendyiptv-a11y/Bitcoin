name: Coeziv BTC Backtest

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - coeziv_state - Generate snapshot BTC
    types:
      - completed

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  backtest:
    name: Run isolated coeziv backtest
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run coeziv backtest and build risk window
        run: |
          python backtest_coeziv.py

      - name: Show risk window
        run: |
          cat btc-swing-strategy/risk_window.json

      - name: Commit risk window data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/risk_window.json data/coeziv_backtest_results.csv data/coeziv_backtest_summary.json
          if git diff --cached --quiet; then
            echo "No backtest or risk_window data changes to commit."
          else
            git commit -m "Update coeziv risk window data"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi

      - name: Upload backtest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coeziv-backtest-results
          path: |
            data/coeziv_backtest_results.csv
            data/coeziv_backtest_summary.json
            btc-swing-strategy/risk_window.json
          if-no-files-found: error
