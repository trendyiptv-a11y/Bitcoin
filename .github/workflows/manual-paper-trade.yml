name: CohesivX Manual Paper Trade

on:
  workflow_dispatch:
    inputs:
      manual_action:
        description: "Manual paper action"
        required: true
        default: "BUY_USDT"
        type: choice
        options:
          - BUY_USDT
          - SELL_PERCENT
          - SELL_ALL
      amount_usdt:
        description: "BUY_USDT amount, paper USDT"
        required: false
        default: "25"
      sell_fraction:
        description: "SELL_PERCENT fraction, e.g. 0.10 = 10%"
        required: false
        default: "0.10"
      note:
        description: "Manual note for journal"
        required: false
        default: "Manual paper action from GitHub workflow."

permissions:
  contents: write

concurrency:
  group: cohesivx-manual-paper-trade
  cancel-in-progress: false

jobs:
  manual-paper-trade:
    name: Execute manual paper trade
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Execute manual paper trade
        env:
          MANUAL_ACTION: ${{ inputs.manual_action }}
          MANUAL_AMOUNT_USDT: ${{ inputs.amount_usdt }}
          MANUAL_SELL_FRACTION: ${{ inputs.sell_fraction }}
          MANUAL_NOTE: ${{ inputs.note }}
        run: python manual_paper_trade.py

      - name: Commit manual paper trade state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/paper_trading_state.json || true
          git add btc-swing-strategy/paper_trading_log.csv || true
          git add btc-swing-strategy/paper_trader_decision.json || true
          git commit -m "Manual paper trade update" || echo "Nothing to commit"
          git push origin main || echo "Push failed; will retry on next manual run"
