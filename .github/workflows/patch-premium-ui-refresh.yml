name: Patch BTC Copy Wording

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  patch-copy-wording:
    name: Patch BTC Monitor wording only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply neutral structural wording and distribution note cache bust
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          targets = [
              Path("btc-swing-strategy/mecanism.html"),
              Path("btc-swing-strategy/i18n-en.js"),
          ]

          replacements = {
              "Mișcare mică; semnalul mecanismului rămâne reperul principal.":
                  "Mișcare mică față de mecanism; reperul structural rămâne principal.",
              "Mișcare relevantă; poți ajusta timing-ul intrării sau ieșirii.":
                  "Mișcare relevantă față de mecanism; urmărește contextul și nivelurile de risc.",
              "Mișcare puternică; verifică contextul și lichiditatea înainte de decizie.":
                  "Mișcare puternică față de mecanism; verifică contextul, lichiditatea și nivelurile de risc.",
              "Small movement; the mechanism signal remains the main reference.":
                  "Small movement versus the mechanism; the structural reference remains primary.",
              "Relevant movement; check the context and timing.":
                  "Relevant movement versus the mechanism; watch context and risk levels.",
              "Strong movement; check context and liquidity.":
                  "Strong movement versus the mechanism; check context, liquidity and risk levels.",
              "Nu sunt semnale de intrare automată, ci context.":
                  "Nu sunt îndemnuri de intrare automată, ci context structural.",
              "These are not automatic entries, but structural context.":
                  "These are not entry prompts, but structural context.",
              "direcția semnalului":
                  "direcția contextului structural",
              "contra semnalului":
                  "în sens opus contextului structural",
              "with the mechanism’s signal":
                  "with the structural context",
              "with the mechanism's signal":
                  "with the structural context",
              "with the signal":
                  "with the structural context",
              "against it":
                  "against the structural context",
          }

          changed = []
          for path in targets:
              if not path.exists():
                  print(f"Missing target: {path}")
                  continue
              text = path.read_text(encoding="utf-8")
              original = text
              for old, new in replacements.items():
                  text = text.replace(old, new)
              if path.name == "mecanism.html":
                  text = text.replace('./distribution-note.js?v=ff55a4f', './distribution-note.js?v=ff55a4f')
                  text = text.replace('./distribution-note.js" defer', './distribution-note.js?v=ff55a4f" defer')
                  if './distribution-note.js?v=ff55a4f' not in text:
                      text = text.replace('</body>', '  <script src="./distribution-note.js?v=ff55a4f" defer></script>\n</body>')
              if text != original:
                  path.write_text(text, encoding="utf-8")
                  changed.append(str(path))
                  print(f"Updated {path}")
              else:
                  print(f"No changes needed in {path}")

          forbidden = [
              "poți ajusta timing-ul intrării sau ieșirii",
              "timing-ul intrării",
              "timing-ul ieșirii",
              "Relevant movement; check the context and timing",
              "automatic entries",
              "semnale de intrare automată",
              "direcția semnalului",
              "contra semnalului",
              "with the mechanism’s signal",
              "with the mechanism's signal",
              "with the signal",
              "against it",
          ]

          remaining = []
          for path in targets:
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              for phrase in forbidden:
                  if phrase in text:
                      remaining.append(f"{path}: {phrase}")

          html = Path("btc-swing-strategy/mecanism.html")
          if html.exists() and './distribution-note.js' not in html.read_text(encoding="utf-8"):
              remaining.append("btc-swing-strategy/mecanism.html: distribution note cache-bust script missing")

          if remaining:
              print("Audit failed:")
              for item in remaining:
                  print(" - " + item)
              sys.exit(1)

          print("Copy audit and distribution note cache-bust passed.")
          PY

      - name: Commit neutral wording if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-swing-strategy/mecanism.html btc-swing-strategy/i18n-en.js
          if git diff --cached --quiet; then
            echo "No copy wording changes to commit."
          else
            git commit -m "Neutralize BTC Monitor wording"
            git push
          fi
