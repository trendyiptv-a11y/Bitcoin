name: Build signed release AAB

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-signed-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Locate Gradle project
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          GRADLEW_PATH="$(find . -name gradlew -type f | head -n 1)"
          if [ -z "$GRADLEW_PATH" ]; then
            echo "No gradlew file found in repository."
            exit 1
          fi
          PROJECT_DIR="$(dirname "$GRADLEW_PATH")"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found Gradle project at: $PROJECT_DIR"

      - name: Build release AAB
        shell: bash
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew clean bundleRelease --stacktrace

      - name: Decode upload keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "Missing GitHub secret: KEYSTORE_BASE64"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > upload-keystore.jks

      - name: Sign release AAB
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_PASSWORD:-}" ] || [ -z "${KEY_ALIAS:-}" ] || [ -z "${KEY_PASSWORD:-}" ]; then
            echo "Missing one or more GitHub secrets: KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD"
            exit 1
          fi

          UNSIGNED_AAB="$(find . -path '*/build/outputs/bundle/release/*.aab' -type f | head -n 1)"
          if [ -z "$UNSIGNED_AAB" ]; then
            echo "No release AAB found under build/outputs/bundle/release."
            exit 1
          fi

          mkdir -p signed-release
          SIGNED_AAB="signed-release/cohesivx-btc-monitor-release-signed.aab"
          cp "$UNSIGNED_AAB" "$SIGNED_AAB"

          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore upload-keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$SIGNED_AAB" \
            "$KEY_ALIAS"

          jarsigner -verify -verbose -certs "$SIGNED_AAB"
          echo "signed_aab=$SIGNED_AAB" >> "$GITHUB_ENV"

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: cohesivx-btc-monitor-release-aab-signed
          path: signed-release/cohesivx-btc-monitor-release-signed.aab
          if-no-files-found: error
